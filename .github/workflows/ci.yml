# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3 (Linux)
        # vapor/swiftly-action delegates to the official `swiftly`
        # toolchain manager, which tracks the canonical swift.org
        # index and supports every released toolchain (unlike
        # swift-actions/setup-swift@v2, whose hard-coded version list
        # tops out at 6.2.1).
        if: runner.os == 'Linux'
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3"

      - name: Set up Swift 6.3 (macOS)
        # vapor/swiftly-action's deps-install step assumes
        # apt/dnf/yum and exits 1 on macOS ("Couldn't figure out how
        # to run the system package manager."), so we install swiftly
        # directly from swift.org. CurrentUserHomeDirectory targets
        # the per-user install path (no sudo needed for the bin dir).
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          curl -fsSL -o /tmp/swiftly.pkg https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg /tmp/swiftly.pkg -target CurrentUserHomeDirectory
          SWIFTLY_BIN="$HOME/Library/Application Support/swiftly/bin"
          "$SWIFTLY_BIN/swiftly" init --quiet-shell-followup --assume-yes --skip-install --no-modify-profile
          "$SWIFTLY_BIN/swiftly" install --use 6.3 --post-install-file=/dev/null
          echo "$SWIFTLY_BIN" >> "$GITHUB_PATH"
          TOOLCHAIN_BIN_DIR="$("$SWIFTLY_BIN/swiftly" use --print-location)/usr/bin"
          echo "$TOOLCHAIN_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify Swift version
        run: swift --version

      - name: Install WASM SDK
        # Required for the end-to-end Test gated by wasmSDKAvailable in
        # BuildCommandIntegrationTests. Without this step the integration
        # test silently skips, leaving the swiflow build path untested in CI.
        # 6.3+ WASM SDKs live on download.swift.org (the swiftwasm/swift
        # GitHub releases stopped at 6.0.x — see swift.org/install for the
        # canonical link). The checksum was computed locally against the
        # exact artifactbundle.tar.gz this URL serves; if you bump the
        # version, recompute via:
        #   curl -sLo /tmp/wasm.tgz <url> && shasum -a 256 /tmp/wasm.tgz
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9
          swift sdk list

      - name: Build library + WebTarget
        run: swift build

      - name: Build CLI
        run: swift build --product swiflow

      - name: Test
        run: swift test --parallel
