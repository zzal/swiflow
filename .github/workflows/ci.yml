# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
    # Docs-only changes shouldn't burn CI minutes — the workflow files
    # themselves (.github/**) are intentionally NOT in the ignore list
    # so workflow tweaks still trigger a run.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

# Auto-cancel superseded runs on the same ref. A rapid sequence of
# pushes to a feature branch (or sequential CI-fix pushes to main)
# would otherwise burn minutes on commits nobody cares about anymore.
# group: combines workflow + ref so unrelated branches don't fight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Push events run Linux only; macOS only runs on PRs. macOS minutes
    # bill at 10x the rate of Linux on the GHA free tier, so every push
    # to main would otherwise eat ~50 billed minutes per run. Linux still
    # catches the vast majority of regressions (compile, unit tests,
    # init+build e2e). Full cross-OS validation lives at the PR gate.
    #
    # NB: A job-level `if:` referencing matrix.os doesn't work — `if:`
    # evaluates before matrix expansion, so `matrix.os` is undefined and
    # the whole job (every cell) gets skipped, leaving zero jobs running.
    # The dynamic matrix below selects the OS list at workflow-load time
    # from github.event_name, which IS available at that point.
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-22.04","macos-14"]' || '["ubuntu-22.04"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3.0 (Linux)
        # vapor/swiftly-action delegates to the official `swiftly`
        # toolchain manager, which tracks the canonical swift.org
        # index and supports every released toolchain (unlike
        # swift-actions/setup-swift@v2, whose hard-coded version list
        # tops out at 6.2.1).
        #
        # Pin to "6.3.0" specifically — the bare "6.3" resolves to the
        # latest patch (currently 6.3.2), and Swift's swiftmodule ABI
        # is strict between patch versions. The WASM SDK below is
        # 6.3.0, so the host must be 6.3.0 too or `swift package js`
        # bails with "module compiled with Swift 6.3 cannot be imported
        # by the Swift 6.3.2 compiler".
        if: runner.os == 'Linux'
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3.0"

      - name: Set up Swift 6.3.0 (macOS)
        # vapor/swiftly-action's deps-install step exits 1 on macOS
        # ("Couldn't figure out how to run the system package manager.").
        # Install swiftly via Homebrew (preinstalled on every GHA
        # macOS runner) — well-known PATH (/opt/homebrew/bin or
        # /usr/local/bin), no path-detection guesswork.
        #
        # 6.3.0 pin: same reason as Linux. ABI strictness vs. WASM SDK.
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install --quiet swiftly
          swiftly init --quiet-shell-followup --assume-yes --skip-install --no-modify-profile
          swiftly install --use 6.3.0 --post-install-file=/dev/null
          # swiftly's macOS install layout has changed across versions
          # (~/.swiftly/toolchains vs ~/Library/Developer/Toolchains vs
          # neither), so hunting for the swift binary by `find` is
          # brittle. Instead, drop a thin shim into ~/.local/bin that
          # delegates every `swift` invocation to `swiftly run swift`.
          # `swiftly run` honours the global default toolchain set by
          # `swiftly install --use` above, no PATH detective work needed.
          SHIM_DIR="$HOME/.local/bin"
          mkdir -p "$SHIM_DIR"
          cat > "$SHIM_DIR/swift" <<'SHIM'
          #!/usr/bin/env bash
          exec swiftly run swift "$@"
          SHIM
          chmod +x "$SHIM_DIR/swift"
          echo "$SHIM_DIR" >> "$GITHUB_PATH"

      - name: Verify Swift version
        run: swift --version

      - name: Cache SwiftPM build + WASM SDK
        # Cache the slow-to-rebuild artifacts:
        #   - .build/                       — native + WASM compile outputs
        #   - .../swift-sdks/               — the installed WASM SDK (~300MB)
        #   - SwiftPM source/registry cache — resolved package sources
        #
        # Cross-OS path list: actions/cache silently ignores paths that
        # don't exist on the runner, so listing both Linux and macOS
        # locations is harmless.
        #
        # Key strategy:
        #   - Full key (cache HIT): Package.resolved unchanged → restore
        #     .build/ and skip most compile work
        #   - Prefix key (PARTIAL hit): Package.resolved changed →
        #     restore the closest older .build/ so unchanged deps are
        #     reused; only changed parts rebuild
        #   - The "swift6.3.0-wasm6.3.0" segment forces a full reset
        #     when we bump toolchain or SDK versions
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ~/.config/swiftpm/swift-sdks
            ~/Library/org.swift.swiftpm/swift-sdks
          key: ${{ runner.os }}-swift6.3.0-wasm6.3.0-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift6.3.0-wasm6.3.0-

      - name: Install WASM SDK (if not cached)
        # Required for the end-to-end Test gated by wasmSDKAvailable in
        # BuildCommandIntegrationTests. Without this step the integration
        # test silently skips, leaving the swiflow build path untested.
        # 6.3+ WASM SDKs live on download.swift.org (swiftwasm/swift
        # GitHub releases stopped at 6.0.x). The checksum was computed
        # locally against the exact artifactbundle.tar.gz this URL
        # serves; to refresh after a version bump:
        #   curl -sLo /tmp/wasm.tgz <url> && shasum -a 256 /tmp/wasm.tgz
        #
        # Cache restore may have already populated the SDK directory;
        # skip the install in that case to save ~30s + 70MB transfer.
        run: |
          if swift sdk list 2>/dev/null | grep -q "swift-6.3-RELEASE_wasm$"; then
            echo "WASM SDK already installed (cache hit)."
          else
            swift sdk install \
              https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9
          fi
          swift sdk list

      - name: Build library + WebTarget
        run: swift build

      - name: Build CLI
        run: swift build --product swiflow

      - name: Test
        run: swift test --parallel

  js-driver-tests:
    name: JS Driver Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: js-driver/package-lock.json

      - name: Install JS deps
        working-directory: js-driver
        run: npm ci --no-audit --no-fund

      - name: Run JS driver tests
        working-directory: js-driver
        run: npm test

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-22.04
    # PR-only: Playwright + Chromium binaries + a full WASM build is
    # expensive; gate behind the merge boundary.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3.0
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3.0"

      - name: Cache SwiftPM build + WASM SDK
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
            ~/.config/swiftpm/swift-sdks
          key: ${{ runner.os }}-swift6.3.0-wasm6.3.0-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift6.3.0-wasm6.3.0-

      - name: Install WASM SDK (if not cached)
        run: |
          if swift sdk list 2>/dev/null | grep -q "swift-6.3-RELEASE_wasm$"; then
            echo "WASM SDK already installed (cache hit)."
          else
            swift sdk install \
              https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9
          fi

      - name: Build swiflow CLI
        run: swift build -c release --product swiflow

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Tests/playwright/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('Tests/playwright/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright deps
        working-directory: Tests/playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Tests/playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: Tests/playwright
        run: npm test

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: Tests/playwright/test-results/
          retention-days: 14
