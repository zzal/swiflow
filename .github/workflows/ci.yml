# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3.0 (Linux)
        # vapor/swiftly-action delegates to the official `swiftly`
        # toolchain manager, which tracks the canonical swift.org
        # index and supports every released toolchain (unlike
        # swift-actions/setup-swift@v2, whose hard-coded version list
        # tops out at 6.2.1).
        #
        # Pin to "6.3.0" specifically — the bare "6.3" resolves to the
        # latest patch (currently 6.3.2), and Swift's swiftmodule ABI
        # is strict between patch versions. The WASM SDK below is
        # 6.3.0, so the host must be 6.3.0 too or `swift package js`
        # bails with "module compiled with Swift 6.3 cannot be imported
        # by the Swift 6.3.2 compiler".
        if: runner.os == 'Linux'
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3.0"

      - name: Set up Swift 6.3.0 (macOS)
        # vapor/swiftly-action's deps-install step exits 1 on macOS
        # ("Couldn't figure out how to run the system package manager.").
        # Install swiftly via Homebrew (preinstalled on every GHA
        # macOS runner) — well-known PATH (/opt/homebrew/bin or
        # /usr/local/bin), no path-detection guesswork.
        #
        # 6.3.0 pin: same reason as Linux. ABI strictness vs. WASM SDK.
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install --quiet swiftly
          swiftly init --quiet-shell-followup --assume-yes --skip-install --no-modify-profile
          swiftly install --use 6.3.0 --post-install-file=/dev/null
          # swiftly normally rewrites shell rc to add Swift to PATH, but
          # GHA steps don't source shell rc. Locate the toolchain bin
          # dir explicitly so subsequent steps see the right `swift`.
          SWIFTLY_HOME="${SWIFTLY_HOME_DIR:-$HOME/.swiftly}"
          TOOLCHAIN_BIN_DIR="$(find "$SWIFTLY_HOME/toolchains" -name swift -type f -path "*/usr/bin/swift" 2>/dev/null | head -1 | xargs dirname)"
          echo "Resolved Swift toolchain: $TOOLCHAIN_BIN_DIR"
          [ -n "$TOOLCHAIN_BIN_DIR" ] || { echo "Could not locate Swift toolchain under $SWIFTLY_HOME/toolchains"; ls -la "$SWIFTLY_HOME/toolchains" 2>/dev/null || true; exit 1; }
          echo "$TOOLCHAIN_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify Swift version
        run: swift --version

      - name: Install WASM SDK
        # Required for the end-to-end Test gated by wasmSDKAvailable in
        # BuildCommandIntegrationTests. Without this step the integration
        # test silently skips, leaving the swiflow build path untested in CI.
        # 6.3+ WASM SDKs live on download.swift.org (the swiftwasm/swift
        # GitHub releases stopped at 6.0.x — see swift.org/install for the
        # canonical link). The checksum was computed locally against the
        # exact artifactbundle.tar.gz this URL serves; if you bump the
        # version, recompute via:
        #   curl -sLo /tmp/wasm.tgz <url> && shasum -a 256 /tmp/wasm.tgz
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9
          swift sdk list

      - name: Build library + WebTarget
        run: swift build

      - name: Build CLI
        run: swift build --product swiflow

      - name: Test
        run: swift test --parallel
