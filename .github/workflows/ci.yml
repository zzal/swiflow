# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
    # Docs-only changes shouldn't burn CI minutes — the workflow files
    # themselves (.github/**) are intentionally NOT in the ignore list
    # so workflow tweaks still trigger a run.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

# Auto-cancel superseded runs on the same ref. A rapid sequence of
# pushes to a feature branch (or sequential CI-fix pushes to main)
# would otherwise burn minutes on commits nobody cares about anymore.
# group: combines workflow + ref so unrelated branches don't fight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # macOS matrix entry is intentionally disabled.
    #
    # Apple's downloadable Swift 6.3 macOS toolchain pkg (what swiftly
    # installs) ships only the dynamic stdlib — no lib/swift_static/ —
    # so any package whose graph builds a CompilerPlugin executable
    # fails the host-side link with "library 'swift_errno' not found"
    # (here: JavaScriptKit's BridgeJSMacros-tool, which we don't use
    # directly but which SwiftPM resolves and compiles eagerly).
    #
    # Apple bundles the full static stdlib inside Xcode's Swift, so a
    # follow-up may either:
    #   (a) replace the swiftly-managed toolchain with Xcode's bundled
    #       Swift via `xcode-select` (needs Xcode 16.4+ to get Swift
    #       6.3 to match the WASM SDK pin), or
    #   (b) drop a static-stdlib overlay into the swiftly toolchain
    #       from the canonical xtoolchain pkg if one exists upstream.
    # Track as a Phase 5 hardening task; Linux gates the vast majority
    # of regressions in the meantime (compile, unit tests, init+build
    # e2e — and the new Playwright e2e on PRs).
    #
    # The dynamic matrix below is kept (rather than removing the
    # strategy block entirely) so re-enabling macOS later is a
    # one-line revert.
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3.2 (Linux)
        # vapor/swiftly-action delegates to the official `swiftly`
        # toolchain manager, which tracks the canonical swift.org
        # index and supports every released toolchain (unlike
        # swift-actions/setup-swift@v2, whose hard-coded version list
        # tops out at 6.2.1).
        #
        # Pin to "6.3.2" specifically — the bare "6.3" resolves to
        # whatever the latest 6.3.x patch is, and Swift's swiftmodule
        # ABI is strict between patch versions. The WASM SDK below is
        # 6.3.2, so the host must be 6.3.2 too or `swift package js`
        # bails with "module compiled with a different Swift version
        # cannot be imported".
        if: runner.os == 'Linux'
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3.2"

      - name: Set up Swift 6.3.2 (macOS)
        # vapor/swiftly-action's deps-install step exits 1 on macOS
        # ("Couldn't figure out how to run the system package manager.").
        # Install swiftly via Homebrew (preinstalled on every GHA
        # macOS runner) — well-known PATH (/opt/homebrew/bin or
        # /usr/local/bin), no path-detection guesswork.
        #
        # 6.3.2 pin: same reason as Linux. ABI strictness vs. WASM SDK.
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install --quiet swiftly
          swiftly init --quiet-shell-followup --assume-yes --skip-install --no-modify-profile
          swiftly install --use 6.3.2 --post-install-file=/dev/null
          # swiftly's macOS install layout has changed across versions
          # (~/.swiftly/toolchains vs ~/Library/Developer/Toolchains vs
          # neither), so don't hunt for the swift binary with `find` —
          # ask swiftly itself where its active toolchain's swift lives,
          # then prepend that directory to the GHA PATH.
          #
          # A shim like `exec swiftly run swift "$@"` won't work here:
          # swift-driver computes its resource directory from argv[0]
          # (../lib/swift/), so a shim at ~/.local/bin/swift sends the
          # driver looking in the wrong place and macros fail to link
          # with "library 'swift_errno' not found".
          swiftly run swift --version  # sanity check
          SWIFT_BIN="$(swiftly run bash -c 'command -v swift')"
          TOOLCHAIN_BIN_DIR="$(dirname "$SWIFT_BIN")"
          echo "Resolved Swift toolchain bin dir: $TOOLCHAIN_BIN_DIR"
          [ -x "$TOOLCHAIN_BIN_DIR/swift" ] || { echo "swiftly returned a non-executable swift path: $SWIFT_BIN"; exit 1; }
          echo "$TOOLCHAIN_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify Swift version
        run: swift --version

      - name: Verify Foundation-free runtime
        # ALL six WASM-bound modules (Swiflow, SwiflowRouter, SwiflowDOM,
        # SwiflowQuery, SwiflowFetcher, SwiflowUI) ship in the binary.
        # Importing Foundation there risks pulling back the reflection /
        # demangler / SIMD cost that Phase 15 cut by 90%. Host-side modules
        # (SwiflowCLI, SwiflowMacrosPlugin) run on macOS/Linux only and are
        # not gated.
        run: |
          set -euo pipefail
          # Update this list when adding a new runtime module.
          if grep -rn "^import Foundation$" \
               Sources/Swiflow \
               Sources/SwiflowRouter \
               Sources/SwiflowDOM \
               Sources/SwiflowQuery \
               Sources/SwiflowFetcher \
               Sources/SwiflowUI; then
            echo "::error::Runtime modules must not import Foundation."
            echo "::error::See docs/superpowers/specs/2026-05-27-phase16-foundation-free-runtime-design.md"
            exit 1
          fi
          echo "Runtime modules are Foundation-free."

      - name: Cache SwiftPM build + WASM SDK
        # Cache the slow-to-rebuild artifacts:
        #   - .build/                       — native + WASM compile outputs
        #   - .../swift-sdks/               — the installed WASM SDK (~300MB)
        #   - SwiftPM source/registry cache — resolved package sources
        #
        # Cross-OS path list: actions/cache silently ignores paths that
        # don't exist on the runner, so listing both Linux and macOS
        # locations is harmless.
        #
        # Key strategy (hash Package.swift, NOT Package.resolved —
        # Package.resolved is gitignored, so it's absent at checkout time
        # and hashFiles() would yield an empty hash, collapsing the key to
        # a constant that never invalidates on a dependency bump):
        #   - Full key (cache HIT): Package.swift unchanged → restore
        #     .build/ and skip most compile work
        #   - Prefix key (PARTIAL hit): Package.swift changed →
        #     restore the closest older .build/ so unchanged deps are
        #     reused; only changed parts rebuild
        #   - The "swift6.3.2-wasm6.3.2" segment forces a full reset
        #     when we bump toolchain or SDK versions
        #
        # NOTE: actions/cache only WRITES on a key miss, and only if the
        # job reaches its post-step — a failed job skips the save. So the
        # cache stays empty until a run goes green; that's expected.
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ~/.config/swiftpm/swift-sdks
            ~/Library/org.swift.swiftpm/swift-sdks
          key: ${{ runner.os }}-swift6.3.2-wasm6.3.2-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift6.3.2-wasm6.3.2-

      - name: Install WASM SDK (if not cached)
        # Required for the end-to-end Test gated by wasmSDKAvailable in
        # BuildCommandIntegrationTests. Without this step the integration
        # test silently skips, leaving the swiflow build path untested.
        # 6.3+ WASM SDKs live on download.swift.org (swiftwasm/swift
        # GitHub releases stopped at 6.0.x). The checksum was computed
        # locally against the exact artifactbundle.tar.gz this URL
        # serves; to refresh after a version bump:
        #   curl -sLo /tmp/wasm.tgz <url> && shasum -a 256 /tmp/wasm.tgz
        #
        # Cache restore may have already populated the SDK directory;
        # skip the install in that case to save ~30s + 70MB transfer.
        run: |
          if swift sdk list 2>/dev/null | grep -q "swift-6.3.2-RELEASE_wasm$"; then
            echo "WASM SDK already installed (cache hit)."
          else
            swift sdk install \
              https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c
          fi
          swift sdk list

      - name: Build library + WebTarget
        run: swift build

      - name: Build CLI
        run: swift build --product swiflow

      - name: Test
        # SWIFLOW_SKIP_WASM_E2E skips the WASM-SDK-gated integration suites: they
        # spawn real, multi-minute `swift build` / `swift package js` invocations,
        # which are slow and redundant on CI — that build pipeline is validated
        # locally against a WASM SDK. With them skipped the suite is fast unit
        # tests. --no-parallel keeps the process-global OnChangeStorage table
        # (keyed by object address) deterministic across suites.
        env:
          SWIFLOW_SKIP_WASM_E2E: "1"
        run: swift test --no-parallel

  js-driver-tests:
    name: JS Driver Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: js-driver/package-lock.json

      - name: Install JS deps
        working-directory: js-driver
        run: npm ci --no-audit --no-fund

      - name: Run JS driver tests
        working-directory: js-driver
        run: npm test

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-22.04
    # PR-only: Playwright + Chromium binaries + a full WASM build is
    # expensive; gate behind the merge boundary.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3.2
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3.2"

      - name: Cache SwiftPM build + WASM SDK
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
            ~/.config/swiftpm/swift-sdks
          key: ${{ runner.os }}-swift6.3.2-wasm6.3.2-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift6.3.2-wasm6.3.2-

      - name: Install WASM SDK (if not cached)
        run: |
          if swift sdk list 2>/dev/null | grep -q "swift-6.3.2-RELEASE_wasm$"; then
            echo "WASM SDK already installed (cache hit)."
          else
            swift sdk install \
              https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c
          fi

      - name: Build swiflow CLI
        run: swift build -c release --product swiflow

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Tests/playwright/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('Tests/playwright/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright deps
        working-directory: Tests/playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Tests/playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: Tests/playwright
        run: npm test

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: Tests/playwright/test-results/
          retention-days: 14

  bundle-size:
    name: Bundle size
    runs-on: ubuntu-22.04
    # PR-only: a full release WASM build is expensive and we only need
    # the gate when something is about to merge.
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.3.2
        uses: vapor/swiftly-action@v0.2.1
        with:
          toolchain: "6.3.2"

      - name: Cache SwiftPM build + WASM SDK
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
            ~/.config/swiftpm/swift-sdks
          key: ${{ runner.os }}-swift6.3.2-wasm6.3.2-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift6.3.2-wasm6.3.2-

      - name: Install WASM SDK (if not cached)
        run: |
          if swift sdk list 2>/dev/null | grep -q "swift-6.3.2-RELEASE_wasm$"; then
            echo "WASM SDK already installed (cache hit)."
          else
            swift sdk install \
              https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c
          fi

      - name: Measure Counter bundle
        run: scripts/measure-bundle.sh

      - name: Compare against baseline
        id: compare
        # Pass PR labels via env (never interpolated into the shell command)
        # so a label name can't shell-inject into the run step.
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: scripts/compare-bundle.sh

      - name: Comment on PR
        if: always() && steps.compare.outputs.report != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bundle-size
          message: ${{ steps.compare.outputs.report }}
