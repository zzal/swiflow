# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Verify Swift version
        run: swift --version

      - name: Install WASM SDK
        # Required for the end-to-end Test gated by wasmSDKAvailable in
        # BuildCommandIntegrationTests. Without this step the integration
        # test silently skips, leaving the swiflow build path untested in CI.
        # The 6.0.x WASM SDK lives on swiftwasm's GitHub releases (canonical
        # for 6.0.x — `download.swift.org` only hosts WASM SDKs from 6.3+).
        run: |
          swift sdk install \
            https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.0.3-RELEASE/swift-wasm-6.0.3-RELEASE-wasm32-unknown-wasi.artifactbundle.zip \
            --checksum 31d3585b06dd92de390bacc18527801480163188cd7473f492956b5e213a8618
          swift sdk list

      - name: Build library + WebTarget
        run: swift build

      - name: Build CLI
        run: swift build --product swiflow

      - name: Test
        run: swift test --parallel
