<!doctype html>
<html lang="en" class="platform-mac">
  <head>
    <meta charset="utf-8" />
    <title>Swiflow Panel</title>
    <style>@import "design_system_tokens.css";</style>
    <style>@import "colors.css";</style>
    <style>@import "application_tokens.css";</style>
    <style>
      /*
       * Token namespace: --sys-color-* / --sys-size-* per the Chromium
       * DevTools UX Style Guide (goo.gle/devtools-ux-style-guide).
       * Reference-palette tokens (--ref-palette-*) and hardcoded color
       * values are explicitly forbidden by the guide. Token definitions
       * live at .chrome/devtools/bundled/design_system_tokens.css and
       * adapt to Chrome's light/dark themes automatically.
       */
      :root {
        height: 100%;
        overflow: hidden;
        interpolate-size: allow-keywords;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-size-adjust: 0.5;
        background: var(--sys-color-cdt-base-container);
        color: var(--sys-color-on-surface);
      }
      body {
        display: flex;
        flex-direction: column;
        font-family: var(--default-font-family);
        font-size: var(--sys-size-6);
      }
      header {
        padding: 6px 10px;
        border-bottom: 1px solid var(--sys-color-divider);
        display: flex;
        align-items: center;
      }
      /* Build stamp: rendered by panel.js from the loaded manifest version.
         If this is blank, you're running a stale cached panel.js. */
      #build-tag {
        margin-left: auto;
        font-size: 11px;
        color: var(--sys-color-on-surface-subtle);
      }
      /* Text-button style per the components guide: outlined border,
         transparent fill, hover shading, visible focus ring. */
      #refresh-btn {
        font: inherit;
        color: var(--sys-color-on-surface);
        background: transparent;
        border: 1px solid var(--sys-color-divider);
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
      }
      #refresh-btn:hover {
        background: var(--sys-color-state-hover-on-subtle);
      }
      #refresh-btn:focus-visible {
        outline: 2px solid var(--sys-color-state-focus-ring);
        outline-offset: 1px;
      }
      #error-region {
        padding: 8px 10px;
        background: var(--sys-color-surface-error);
        color: var(--sys-color-error);
        border-bottom: 1px solid var(--sys-color-divider);
      }
      #error-region[hidden] { display: none; }
      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      #tree-pane, #state-pane {
        overflow: auto;
        padding: 8px;
      }
      #tree-pane {
        flex: 1;
        border-right: 1px solid var(--sys-color-divider);
      }
      #state-pane {
        width: 40%;
        min-width: 200px;
      }
      footer {
        padding: 4px 10px;
        border-top: 1px solid var(--sys-color-divider);
        font-size: 11px;
        color: var(--sys-color-on-surface-subtle);
      }
      .live-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
        background: var(--sys-color-on-surface-subtle);
      }
      .live-indicator--green { background: var(--sys-color-primary); }
      .live-indicator--grey  { background: var(--sys-color-on-surface-subtle); }
      .live-indicator--red   { background: var(--sys-color-error); }
      .tree-row {
        white-space: pre;
        cursor: pointer;
        padding: 1px 4px;
      }
      .tree-row:hover {
        background: var(--sys-color-state-hover-on-subtle);
      }
      /* Selection follows the DevTools focused-vs-unfocused convention:
         default to neutral-container (unfocused); promote to tonal-container
         (focused) when the panel as a whole has focus. Uses body:focus-within
         as a proxy for "panel is the active surface" without requiring
         tabindex on every row. */
      .tree-row.selected {
        background: var(--sys-color-neutral-container);
        color: var(--sys-color-on-surface);
      }
      body:focus-within .tree-row.selected {
        background: var(--sys-color-tonal-container);
        color: var(--sys-color-on-tonal-container);
      }
      .state-key { color: var(--sys-color-primary); }
      .state-value { color: var(--sys-color-on-surface); }
      .empty-state {
        padding: 20px;
        text-align: center;
        color: var(--sys-color-on-surface-subtle);
      }
    </style>
  </head>
  <body>
    <header>
      <button id="refresh-btn">↻ Refresh</button>
      <span id="build-tag"></span>
    </header>
    <div id="error-region" hidden></div>
    <main>
      <div id="tree-pane">
        <div class="empty-state">Click ↻ Refresh to load the component tree.</div>
      </div>
      <div id="state-pane">
        <div class="empty-state">Select a component to view its @State.</div>
      </div>
    </main>
    <footer>
      <span id="live-indicator" class="live-indicator live-indicator--grey" title="Paused"></span>
      <span id="footer"></span>
    </footer>
    <script src="panel.js"></script>
  </body>
</html>
