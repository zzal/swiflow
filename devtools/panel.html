<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Swiflow Panel</title>
    <style>
      :root {
        --bg: #1e1e1e;
        --fg: #d4d4d4;
        --accent: #4ec9b0;
        --error-bg: #5a1d1d;
        --error-fg: #ffb4b4;
        --row-hover: #2a2d2e;
        --row-selected: #094771;
        --border: #333;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
      }
      body {
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
      }
      #error-region {
        padding: 8px 10px;
        background: var(--error-bg);
        color: var(--error-fg);
        border-bottom: 1px solid var(--border);
      }
      #error-region[hidden] { display: none; }
      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      #tree-pane, #state-pane {
        overflow: auto;
        padding: 8px;
      }
      #tree-pane {
        flex: 1;
        border-right: 1px solid var(--border);
      }
      #state-pane {
        width: 40%;
        min-width: 200px;
      }
      footer {
        padding: 4px 10px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: #888;
      }
      .tree-row {
        white-space: pre;
        cursor: pointer;
        padding: 1px 4px;
      }
      .tree-row:hover { background: var(--row-hover); }
      .tree-row.selected { background: var(--row-selected); }
      .state-key { color: var(--accent); }
      .state-value { color: var(--fg); }
      .empty-state {
        padding: 20px;
        text-align: center;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      <button id="refresh-btn">↻ Refresh</button>
    </header>
    <div id="error-region" hidden></div>
    <main>
      <div id="tree-pane">
        <div class="empty-state">Click ↻ Refresh to load the component tree.</div>
      </div>
      <div id="state-pane">
        <div class="empty-state">Select a component to view its @State.</div>
      </div>
    </main>
    <footer id="footer"></footer>
    <script src="panel.js"></script>
  </body>
</html>
